name: PulseDesk Daily Digest

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to send'
        required: false
        default: 'Morning'
        type: choice
        options:
          - Morning
          - Evening

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set edition
        id: edition
        run: |
          if [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            echo "edition=Evening" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "edition=${{ github.event.inputs.edition }}" >> $GITHUB_OUTPUT
          else
            echo "edition=Morning" >> $GITHUB_OUTPUT
          fi

      - name: Send Digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
        run: python main.py --now ${{ steps.edition.outputs.edition }}name: PulseDesk Daily Digest

